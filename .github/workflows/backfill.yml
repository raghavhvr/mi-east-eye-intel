name: Backfill from Jan 2026

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: false
        default: "2026-01-01"
      end_date:
        description: "End date (YYYY-MM-DD, leave blank for today)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run backfill
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"
          if [ -z "$END" ]; then
            node scripts/backfill.js --start "$START"
          else
            node scripts/backfill.js --start "$START" --end "$END"
          fi

      - name: Commit backfilled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/feeds.json
          git diff --staged --quiet || git commit -m "chore: backfill feeds from ${{ github.event.inputs.start_date }}"
          git push
