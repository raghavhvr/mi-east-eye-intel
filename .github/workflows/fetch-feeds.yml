name: Fetch Feeds

on:
  schedule:
    - cron: "0 2 * * *"   # 2 AM UTC daily (6 AM Dubai)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch-feeds
        run: node scripts/fetch-feeds.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/feeds.json
          git diff --staged --quiet || git commit -m "chore: update feeds $(date -u '+%Y-%m-%dT%H:%M')"
          git push
