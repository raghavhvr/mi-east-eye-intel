name: Generate Brief

on:
  schedule:
    - cron: "40 2 * * *"   # 2:20 AM UTC (6:20 AM Dubai)
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate brief
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-brief.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/brief.json public/data/lottery-brief.json || true
          git diff --staged --quiet || git commit -m "chore: update brief $(date -u '+%Y-%m-%dT%H:%M')"
          git push
