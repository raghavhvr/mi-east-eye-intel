name: Fetch GDELT Events (BigQuery)

on:
  schedule:
    - cron: "30 2 * * *"   # 2:30 AM UTC daily — yesterday's data is always complete by then
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch yesterday's GDELT events
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: node scripts/fetch-gdelt-bq.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/gdelt-events.json
          git diff --staged --quiet || git commit -m "chore: gdelt events $(date -u '+%Y-%m-%d')"
          git push
